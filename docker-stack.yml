version: '3.8'

services:
  backend:
    image: vghuy/midterm-api:latest 
    environment:
      - MONGO_URI=mongodb://mongodb:27017/midterm_db
    deploy:
      replicas: 3 
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    networks:
      - app_net

  mongodb: 
    image: mongo:6.0
    volumes:
      - db_data:/data/db
    deploy:
      placement:
        constraints:
          - node.role == manager 
    networks:
      - app_net

  nginx: 
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro 
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net 
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  db_data:

networks:
  app_net:
    driver: overlay