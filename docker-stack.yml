version: '3.8'

services:
  backend:
    image: vghuy/midterm-api:${TAG:-latest}
    environment:
      - MONGO_URI=mongodb://mongodb:27017/midterm_db
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
    networks:
      - app_net
    # labels: ... (nếu dùng Traefik sau này)

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app_net
    deploy:
      placement:
        constraints: [node.role == manager]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app_net
    deploy:
      placement:
        constraints: [node.role == manager]

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - app_net
    deploy:
      mode: global

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    networks:
      - app_net
    deploy:
      mode: global
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  mongodb:
    image: mongo:6.0
    volumes:
      - db_data:/data/db
    deploy:
      placement:
        constraints: [node.role == manager]
    networks:
      - app_net

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-config:/etc/nginx/conf.d   # Dùng Docker Config hoặc volume tốt hơn
    networks:
      - app_net
    deploy:
      placement:
        constraints: [node.role == manager]

volumes:
  db_data:
  nginx-config:   # Thêm volume này

networks:
  app_net:
    driver: overlay
    attachable: true