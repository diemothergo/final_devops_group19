server {
    listen 80;
    server_name devops-midterm-2026.online www.devops-midterm-2026.online;
    
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name devops-midterm-2026.online www.devops-midterm-2026.online;

    ssl_certificate /etc/letsencrypt/live/devops-midterm-2026.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devops-midterm-2026.online/privkey.pem;

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}