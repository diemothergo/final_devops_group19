name: CI/CD - Docker Swarm (Tier 4)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: vghuy/midterm-api
  STACK_NAME: final_devops_group19
  SERVER_PATH: /home/ubuntu/final_devops_group19

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies & Cache
        run: npm ci

      - name: Lint code
        run: npx eslint . --max-warnings=0

      - name: Security Scan - npm audit
        run: npm audit --audit-level=high

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln'
          ignore-unfixed: true
          vuln-type: 'os,library'

  cd:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.MANAGER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.SERVER_PATH }}
            git pull origin main --rebase
            TAG=${{ github.sha }} docker stack deploy -c docker-stack.yml ${{ env.STACK_NAME }} \
              --with-registry-auth \
              --prune
            echo "Deployment completed successfully!"
            docker service ls
            docker stack ps ${{ env.STACK_NAME }}
