version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: midterm_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  web:
    image: ${WEB_IMAGE:-vghuy/midterm-api:latest}
    container_name: midterm_web
    restart: always
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/products_db
    depends_on:
      - mongo
    volumes:
      - uploads_data:/usr/src/app/public/uploads
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: midterm_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - web

  node-exporter:
    image: prom/node-exporter:latest
    container_name: midterm_node_exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: midterm_cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  grafana:
    image: grafana/grafana:latest
    container_name: midterm_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-worldmap-panel
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_storage:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mongo_data:
  uploads_data:
  prometheus_data:
  grafana_storage:
